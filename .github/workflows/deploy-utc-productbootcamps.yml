name: Deploy UTC Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: utc-productbootcamps-production
  cancel-in-progress: true

jobs:
  deploy:
    if: vars.UTC_AUTODEPLOY_ENABLED != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.UTC_DEPLOY_HOST }}
          username: ${{ vars.UTC_DEPLOY_USER }}
          key: ${{ secrets.UTC_DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            REPO_DIR="/var/www/utc-productbootcamps/repo"
            ENV_FILE_PATH="$REPO_DIR/.env.production"
            DEPLOY_TMP_DIR="$(mktemp -d /tmp/utc-productbootcamps.XXXXXX)"

            cleanup() {
              git -C "$REPO_DIR" worktree remove --force "$DEPLOY_TMP_DIR" 2>/dev/null || rm -rf "$DEPLOY_TMP_DIR"
            }

            trap cleanup EXIT

            git -C "$REPO_DIR" fetch --prune origin
            git -C "$REPO_DIR" worktree add --force --detach "$DEPLOY_TMP_DIR" "$GITHUB_SHA"

            ENV_FILE="$ENV_FILE_PATH" REPO_DIR="$DEPLOY_TMP_DIR" bash "$DEPLOY_TMP_DIR/scripts/deploy-utc-productbootcamps.sh" "$GITHUB_SHA"
